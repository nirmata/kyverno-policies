apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-ingress-tls
  annotations:
    policies.kyverno.io/title: Require TLS for Ingress Resources
    policies.kyverno.io/category: CIS EKS Benchmark - 5.4.5
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Ingress
    policies.kyverno.io/description: >-
      CIS EKS Benchmark 5.4.5: Use HTTPS (TLS) for load balancers.
      All Ingress resources must specify TLS configuration to ensure
      traffic is encrypted in transit. Unencrypted HTTP Ingresses expose
      sensitive data to interception and violate transport security
      requirements. Configure spec.tls with a valid secretName to enable
      TLS termination at the Ingress layer.
    policies.kyverno.io/minversion: "1.10.0"
spec:
  validationFailureAction: Audit
  background: true
  rules:
  - name: require-ingress-tls
    match:
      any:
      - resources:
          kinds:
          - Ingress
    validate:
      message: >-
        Ingress must configure TLS (spec.tls must contain at least one entry).
        Add a spec.tls block with a secretName referencing a TLS Secret.
        See CIS EKS Benchmark 5.4.5.
      deny:
        conditions:
          all:
          - key: "{{ length(request.object.spec.tls || `[]`) }}"
            operator: Equals
            value: "0"
