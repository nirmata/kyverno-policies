apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-secrets-as-env-vars
  annotations:
    policies.kyverno.io/title: Restrict Secrets as Environment Variables
    policies.kyverno.io/category: CIS EKS Benchmark
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: "1.6.0"
    kyverno.io/kubernetes-version: "1.22+"
    policies.nirmata.io/remediation-docs: "https://docs.nirmata.io/policysets/cis-eks/restrict-secrets-as-env-vars/"
    policies.kyverno.io/description: >-
      CIS EKS Benchmark 5.x: Avoid exposing Kubernetes Secrets as environment variables.
      Environment variables are visible in pod specs, may be logged, and can be accessed
      via process inspection. On EKS, prefer AWS IAM Roles for Service Accounts (IRSA)
      for AWS credentials and volume mounts (with projected volumes) for other secrets.
      This policy audits pods that reference Secrets via secretKeyRef in any container
      environment variables, encouraging more secure secret consumption patterns.
spec:
  validationFailureAction: Audit
  background: true
  rules:
  - name: restrict-secrets-as-env-vars
    match:
      any:
      - resources:
          kinds:
          - Pod
    validate:
      message: >-
        Pod '{{ request.object.metadata.name }}' mounts a Kubernetes Secret as an
        environment variable via secretKeyRef. Prefer volume mounts or AWS IRSA for
        secret access per CIS EKS 5.x best practices.
      deny:
        conditions:
          any:
          - key: "{{ request.object.spec.[initContainers, containers, ephemeralContainers][].env[?valueFrom.secretKeyRef][] | length(@) }}"
            operator: GreaterThan
            value: "0"
