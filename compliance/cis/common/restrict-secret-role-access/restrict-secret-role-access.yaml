apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-secret-role-access
  annotations:
    policies.kyverno.io/title: Restrict Secret Access in Roles
    policies.kyverno.io/category: CIS EKS Benchmark
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: ClusterRole, Role
    policies.kyverno.io/minversion: "1.6.0"
    kyverno.io/kubernetes-version: "1.22+"
    policies.nirmata.io/remediation-docs: "https://docs.nirmata.io/policysets/cis-eks/restrict-secret-role-access/"
    policies.kyverno.io/standards: "cis-eks,cis-kubernetes,cis-aks,cis-gke,nsa-cisa,nist-800-53"
    policies.nirmata.io/nsa-cisa-control: "Sec.1.6,Sec.3.1"
    policies.nirmata.io/nist-800-53-control: "AC-3,IA-5"
    policies.nirmata.io/cis-eks-control: "4.1.2"
    policies.kyverno.io/description: >-
      CIS EKS Benchmark 4.1.2: Overly permissive access to Kubernetes Secrets can lead
      to credential theft and privilege escalation. Roles and ClusterRoles that grant
      wildcard verb access to Secrets (or all resources) provide excessive permissions.
      This policy audits any Role or ClusterRole that combines access to Secrets or all
      resources with wildcard verbs, which is the most dangerous permission pattern.
spec:
  validationFailureAction: Audit
  background: true
  rules:
  - name: minimize-secret-access
    match:
      any:
      - resources:
          kinds:
          - ClusterRole
          - Role
    validate:
      message: >-
        Role '{{ request.object.metadata.name }}' grants wildcard verb access to Secrets
        or all resources. Minimize secret access per CIS EKS 4.1.2. Scope permissions
        to specific secrets using resourceNames and named verbs only.
      deny:
        conditions:
          all:
          - key: "{{ (contains(request.object.rules[].resources[], 'secrets') || contains(request.object.rules[].resources[], '*')) }}"
            operator: Equals
            value: true
          - key: "{{ contains(request.object.rules[].verbs[], '*') }}"
            operator: Equals
            value: true
