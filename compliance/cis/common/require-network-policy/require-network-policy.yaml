apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-network-policy
  annotations:
    policies.kyverno.io/title: Require Network Policy
    policies.kyverno.io/category: CIS EKS Benchmark
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Namespace
    policies.kyverno.io/minversion: "1.7.0"
    kyverno.io/kubernetes-version: "1.22+"
    policies.nirmata.io/remediation-docs: "https://docs.nirmata.io/policysets/cis-eks/require-network-policy/"
    policies.kyverno.io/standards: "cis-eks,cis-kubernetes,cis-aks,cis-gke,soc2,nsa-cisa,nist-800-53"
    policies.nirmata.io/nsa-cisa-control: "Sec.2.1"
    policies.nirmata.io/nist-800-53-control: "SC-7"
    policies.nirmata.io/cis-eks-control: "4.3.1"
    policies.kyverno.io/description: >-
      CIS EKS Benchmark 4.3.1: Configuring Kubernetes network policies ensures that
      pod-to-pod communication is restricted and follows the principle of least privilege.
      Without network policies, any pod can communicate with any other pod in the cluster,
      increasing the blast radius in the event of a compromise. This policy audits
      Namespaces that have no NetworkPolicy defined, excluding system namespaces.
spec:
  validationFailureAction: Audit
  background: true
  rules:
  - name: require-network-policy
    match:
      any:
      - resources:
          kinds:
          - Namespace
    exclude:
      any:
      - resources:
          names:
          - kube-system
          - kube-public
          - kube-node-lease
    context:
    - name: networkpolicies
      apiCall:
        urlPath: "/apis/networking.k8s.io/v1/namespaces/{{request.object.metadata.name}}/networkpolicies"
        jmesPath: "items | length(@)"
    validate:
      message: >-
        Namespace '{{ request.object.metadata.name }}' has no NetworkPolicy. At least
        one NetworkPolicy is required per CIS EKS 4.3.1 to enforce network segmentation.
        Apply a default-deny-all NetworkPolicy and allow only required traffic.
      deny:
        conditions:
          all:
          - key: "{{ networkpolicies }}"
            operator: LessThan
            value: 1
