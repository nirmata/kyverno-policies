    cis-eks:        ["4.1.3"]
    cis-kubernetes: ["5.1.3"]
    nsa-cisa:       ["Sec.3.1"]
    nist-800-53:    ["AC-6"]

  restrict-escalation-verbs-roles:
    path: rbac-best-practices/restrict-escalation-verbs-roles/
    standards:      [cis-eks, cis-kubernetes, cis-aks, cis-gke, soc2, iso27001, nsa-cisa, nist-800-53]
    cis-eks:        ["4.1.2"]
    cis-kubernetes: ["5.1.2"]
    soc2:           ["CC6.1"]
    iso27001:       ["A.9.4.1"]
    nsa-cisa:       ["Sec.3.1"]
    nist-800-53:    ["AC-3", "AC-6"]

  restrict-wildcard-resources:
    path: rbac-best-practices/restrict-wildcard-resources/
    standards:      [cis-eks, cis-kubernetes, cis-aks, cis-gke, nsa-cisa, nist-800-53]
    cis-eks:        ["4.1.3"]
    cis-kubernetes: ["5.1.3"]
    nsa-cisa:       ["Sec.3.1"]
    nist-800-53:    ["AC-3", "AC-6"]

  # --- Best Practices Kubernetes (best-practices-k8s/) ---

  disallow-default-namespace:
    path: best-practices-k8s/disallow-default-namespace/
    standards:      [cis-eks, cis-kubernetes, cis-aks, cis-gke, iso27001, nsa-cisa, nist-800-53]
    cis-eks:        ["4.5.1"]
    cis-kubernetes: ["5.7.2"]
    nsa-cisa:       ["Sec.3.1"]
    nist-800-53:    ["CM-7", "SC-39"]

  disallow-latest-tag:
    path: best-practices-k8s/disallow_latest_tag/
    standards:      [cis-eks, cis-kubernetes, cis-aks, cis-gke, iso27001, nsa-cisa, nist-800-53]
    cis-eks:        ["5.1.x"]
    cis-kubernetes: ["5.1.x"]
