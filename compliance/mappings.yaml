    cis-eks:        ["4.1.1"]
    cis-kubernetes: ["5.1.1"]
    soc2:           ["CC6.3"]
    iso27001:       ["A.9.4.1"]
    nsa-cisa:       ["Sec.3.1"]
    nist-800-53:    ["AC-2", "AC-6"]

  restrict-clusterrole-nodesproxy:
