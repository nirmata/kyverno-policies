# ── Non-automatable controls ────────────────────────────────────────────────────
# Controls in each standard that CANNOT be assessed by Kyverno policy scans.
# These require organizational processes, cloud provider APIs, or runtime tooling
# outside the Kubernetes API. Documented here so reports can flag them explicitly
# rather than silently omitting them.

non-automatable:

  soc2:
    - id: "CC1.1–CC1.5"
      family: "Control Environment"
      reason: "Board oversight, HR policies, organizational accountability structures — requires governance documentation review"
    - id: "CC2.1–CC2.3"
      family: "Communication and Information"
      reason: "Internal and external communication of control objectives — requires policy and process documentation"
    - id: "CC3.1–CC3.4"
      family: "Risk Assessment"
      reason: "Risk identification, fraud risk assessment, and change risk monitoring — requires risk register and GRC tooling"
    - id: "CC4.1–CC4.2"
      family: "Monitoring Activities"
      reason: "Ongoing evaluation of internal control effectiveness — requires audit logs, SOC reviews, and management sign-off"
    - id: "CC5.1–CC5.3"
      family: "Control Activities"
      reason: "Policy deployment and technology general controls governance — requires documented policies and procedures"
    - id: "CC6.2"
      family: "Logical Access — User Provisioning"
      reason: "User registration, MFA enrollment, credential issuance workflows — requires IAM (Okta, AWS IAM, etc.)"
    - id: "CC6.4"
      family: "Physical Access Controls"
      reason: "Data center physical security and environmental protections — requires cloud provider SOC 2 attestation (AWS, GCP, Azure)"
    - id: "CC6.5"
      family: "Authentication Controls"
      reason: "MFA, application-level authentication, access control lists for users — requires identity provider configuration review"
    - id: "CC7.1"
      family: "Configuration Monitoring"
      reason: "Runtime configuration drift and anomaly detection — requires SIEM or cloud-native monitoring (CloudWatch, Datadog)"
    - id: "CC7.3–CC7.5"
      family: "Security Incident Response"
      reason: "Incident triage, response, and recovery procedures — requires documented runbooks and incident management tooling"
    - id: "CC9.1–CC9.2"
      family: "Risk Mitigation and Vendor Management"
      reason: "Business risk management and vendor/third-party risk assessment — requires vendor contracts and risk documentation"
    - id: "C1.1–C1.2"
      family: "Confidentiality"
      reason: "Data classification and encryption at rest — requires cloud KMS configuration review and data governance policies"
    - id: "PI1.1–PI1.5"
      family: "Processing Integrity"
      reason: "Transaction completeness, accuracy, and data quality — requires application-level audit trails and data validation controls"

  nist-800-53:
    - id: "AC-2, AC-5"
      family: "Account Management / Separation of Duties"
      reason: "User lifecycle management and SoD enforcement — requires IAM system review"
    - id: "AT-2, AT-3"
      family: "Awareness and Training"
      reason: "Security awareness training programs — requires HR/LMS documentation"
    - id: "AU-2–AU-12"
      family: "Audit and Accountability"
      reason: "Audit log generation and review — requires SIEM/CloudTrail/Audit Logging configuration"
    - id: "CA-2, CA-7"
      family: "Assessment and Authorization"
      reason: "Control assessments and continuous monitoring program — requires GRC tooling"
