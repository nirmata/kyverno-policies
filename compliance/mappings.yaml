    cis-eks:        ["4.3.1"]
    cis-kubernetes: ["5.3.2"]
    soc2:           ["CC6.6", "A1.2"]
    nsa-cisa:       ["Sec.2.1"]
    nist-800-53:    ["SC-7"]

  require-pss-labels:
