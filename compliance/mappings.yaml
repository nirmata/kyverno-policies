    cis-eks:        ["5.1.3"]
    cis-kubernetes: ["5.1.3"]
    nsa-cisa:       ["Sec.1.3"]
    nist-800-53:    ["SC-39", "CM-7"]

  # --- RBAC Best Practices (rbac-best-practices/) ---

  disable-automount-sa-token:
    path: rbac-best-practices/disable-automount-sa-token/
    standards:      [cis-eks, cis-kubernetes, cis-aks, cis-gke, soc2, iso27001, nsa-cisa, nist-800-53]
    cis-eks:        ["4.1.6"]
    cis-kubernetes: ["5.1.6"]
    nsa-cisa:       ["Sec.3.2"]
    nist-800-53:    ["IA-5", "AC-3"]

  restrict-automount-sa-token:
    path: rbac-best-practices/restrict-automount-sa-token/
