apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Note: require-network-policy.yaml is not included here to avoid naming conflicts
# when this bundle is composed with CIS common (which has its own require-network-policy).
# Apply require-network-policy.yaml directly if using pci-dss standalone without CIS.
resources:
- add-annotations.yaml
- deny-lb-creation.yaml
- restrict-basic-auth-secret.yaml
- require-clamav-enabled.yaml
- disallow-default-service-account.yaml
- deny-ingress-creation.yaml
