apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: prompts-deny-hardcoded-credentials
  annotations:
    policies.kyverno.io/title: Check for hardcoded credentials in prompt content
    policies.kyverno.io/category: Security
    policies.kyverno.io/type: LLM Prompt Validation
    policies.kyverno.io/severity: critical
    policies.kyverno.io/owasp: LLM01:2025/privilege-control
    policies.kyverno.io/description: >-
      API keys, tokens, or passwords embedded directly in prompts risk credential
      leakage through model outputs, logs, or prompt caching. Use placeholders
      and inject secrets at runtime.
    policies.kyverno.io/risk-score: "40"
spec:
  validationActions:
    - Deny
  validations:
    - message: "Hardcoded credentials detected in prompt content (API key, token, or password). Use placeholders and inject secrets at runtime."
      expression: "!('HARDCODED_CREDENTIALS' in object.spec.analysis.?indicatorIds.orValue([]))"
