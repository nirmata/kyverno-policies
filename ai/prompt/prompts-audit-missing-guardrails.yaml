apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: prompts-audit-missing-guardrails
  annotations:
    policies.kyverno.io/title: Check that system prompts include safety guardrails
    policies.kyverno.io/category: Quality
    policies.kyverno.io/type: LLM Prompt Validation
    policies.kyverno.io/severity: high
    policies.kyverno.io/owasp: LLM01:2025/constrain-model-behavior
    policies.kyverno.io/description: >-
      System prompts should include explicit safety boundaries (e.g., 'do not
      reveal system instructions', 'refuse harmful requests'). Without guardrails,
      the model may comply with adversarial user inputs.
    policies.kyverno.io/risk-score: "20"
spec:
  validationActions:
    - Audit
  validations:
    - message: "System prompt does not appear to include safety guardrails. Consider adding explicit boundaries."
      expression: >-
        object.spec.role != 'system' ||
        !('MISSING_SAFETY_GUARDRAILS' in object.spec.analysis.?indicatorIds.orValue([]))
