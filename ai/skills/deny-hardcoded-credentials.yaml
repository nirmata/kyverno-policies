apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: skills-deny-hardcoded-credentials
  annotations:
    policies.kyverno.io/title: Check for hardcoded credentials in skill content
    policies.kyverno.io/category: Security-Block
    policies.kyverno.io/type: Agent Skill Validation
    policies.kyverno.io/control-objective: Credential Hygiene
    policies.kyverno.io/severity: critical
    policies.kyverno.io/description: >-
      Hardcoded API keys, tokens, or passwords in skill files risk credential
      leakage. Credentials must be injected via environment variables or
      secure credential stores.
    policies.kyverno.io/risk-score: "35"
spec:
  validationActions:
    - Deny
  validations:
    - message: "Hardcoded credentials detected (API key, token, or password). Credentials should use environment variables or secure credential stores, never appear in skill content."
      expression: "!('HARDCODED_CREDENTIALS' in object.spec.analysis.?indicatorIds.orValue([]))"
