apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: skills-audit-secrets-in-config-names
  annotations:
    policies.kyverno.io/title: Check for secret or credential filenames
    policies.kyverno.io/category: Security-Review
    policies.kyverno.io/type: Agent Skill Validation
    policies.kyverno.io/control-objective: Credential Hygiene
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Files named .env, credentials, secrets, or api-keys suggest hardcoded
      secrets. Credentials should be injected via environment variables, never
      shipped with the skill.
    policies.kyverno.io/risk-score: "20"
spec:
  validationActions:
    - Audit
  variables:
    - name: secretFiles
      expression: >-
        object.spec.files.filter(f,
          f.path.matches('(?i).*(^|/)(\\.env|\\.env\\..+|credentials|secrets|tokens|api[_-]?keys?)(\\..*)?$')
        )
  validations:
    - message: "Skill contains files with names suggesting secrets or credentials (e.g., .env, credentials, secrets). Credentials should use environment variables, never appear in skill content."
      messageExpression: >-
        'Files with names suggesting secrets or credentials: ' +
        variables.secretFiles.map(f, f.path).join(', ')
      expression: "variables.secretFiles.size() == 0"
