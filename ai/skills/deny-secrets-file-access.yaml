apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: skills-deny-secrets-file-access
  annotations:
    policies.kyverno.io/title: Check for access to well-known credential files
    policies.kyverno.io/category: Security-Block
    policies.kyverno.io/type: Agent Skill Validation
    policies.kyverno.io/control-objective: Credential Hygiene
    policies.kyverno.io/severity: critical
    policies.kyverno.io/description: >-
      Skills that read well-known credential files such as ~/.aws/credentials,
      ~/.docker/config.json, ~/.npmrc, ~/.netrc, or gcloud configs can harvest
      cloud and service credentials. macOS Keychain access via the security CLI
      and git credential helpers are also flagged.
    policies.kyverno.io/risk-score: "35"
spec:
  validationActions:
    - Deny
  validations:
    - message: "Cloud/service credential file access detected: skill reads ~/.aws/credentials, ~/.docker/config.json, ~/.npmrc, ~/.netrc, or gcloud config."
      expression: "!('SECRETS_CREDENTIAL_FILE' in object.spec.analysis.?indicatorIds.orValue([]))"
    - message: "macOS Keychain or system credential store access detected: security find-generic-password, security find-internet-password, or credential-manager."
      expression: "!('SECRETS_KEYCHAIN_ACCESS' in object.spec.analysis.?indicatorIds.orValue([]))"
    - message: "Git credential harvesting detected: git config credential.helper or .git-credentials access."
      expression: "!('SECRETS_GIT_CREDENTIALS' in object.spec.analysis.?indicatorIds.orValue([]))"
